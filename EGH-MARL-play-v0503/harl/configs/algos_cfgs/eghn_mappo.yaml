# This is the configuration file for the MAPPO algorithm.
seed:
  # whether to use the specified seed
  seed_specify: True
  # seed
  seed: 2
device:
  # whether to use CUDA
  cuda: True
  # whether to set CUDA deterministic
  cuda_deterministic: True
  # arg to torch.set_num_threads
  torch_threads: 4
train:
  train_flag: True
  # number of parallel environments for training data collection
  n_rollout_threads: 10
  # number of total training steps
  num_env_steps: 10000000
  # number of steps per environment per training data collection
  episode_length: 200
  # logging interval
  log_interval: 5
  # evaluation interval
  eval_interval: 25
  # whether to use ValueNorm
  use_valuenorm: True
  # ways of learning rate decay:["~","linear","exponential","polynomial","cosine","step","customized"]
  lr_decay_mode: linear
  # whether to consider the case of truncation when an episode is done
  use_proper_time_limits: True
  # if set, load models from this directory; otherwise, randomly initialise the models
  model_dir: ~
  # model_dir: /mnt/ssd/disk2/tyk/EGH-MARL/results_eswa/rendezvous/hepnlocal-directacc/eghn_mappo/test5/seed-00005-2026-02-16-21-42-36/models
  # model_dir: /mnt/ssd/disk2/tyk/EGH-MARL/results_eswa/rendezvous/hepnlocal-directacc/eghn_mappo/test15/seed-00005-2026-02-16-21-02-20/models
  # model_dir: /mnt/ssd/disk2/tyk/EGH-MARL/results_eswa/rendezvous/hepnlocal-directacc/eghn_mappo/test20/seed-00005-2026-02-16-21-10-39/models
  # model_dir: /mnt/data/ssd/tyk/EGH-MARL/results_eswa/rendezvous/hepnlocal-directacc/eghn_mappo/test10/seed-00002-2026-02-16-02-32-14/models
  # model_dir: /mnt/data/ssd/tyk/EGH-MARL/results_eswa/rendezvous/hepnlocal-directacc/eghn_mappo/installtest/seed-00002-2/models
  # model_dir: /mnt/data/ssd/tyk/EGH-MARL/results_eswa/rendezvous/hepnlocal-directacc/eghn_mappo/installtest/seed-00002-3/models
  # model_dir: /mnt/data/ssd/tyk/EGH-MARL/results_eswa/rendezvous/hepnlocal-direct/eghn_mappo/test40/seed-00002-2026-02-21-13-36-12/models
  # model_dir: /mnt/data/ssd/tyk/EGH-MARL/results_eswa/rendezvous/hepnlocal-direct/eghn_mappo/test5/seed-00003-2/models
  # model_dir: /mnt/data/ssd/tyk/EGH-MARL/results_eswa/rendezvous/hepnlocal-direct/eghn_mappo/test/seed-00002-2026-02-22-04-20-13/models
  # model_dir: /mnt/data/ssd/tyk/EGH-MARL/results_eswa/rendezvous/hepnlocal-direct/eghn_mappo/test15/seed-00003-3/models
  # model_dir: /mnt/data/ssd/tyk/EGH-MARL/results_eswa/rendezvous/hepnlocal-direct/eghn_mappo/test20/seed-00002-3/models
  
  # model_dir: /mnt/ssd/disk2/tyk/EGH-MARL/results_eswa/pursuit/hepnlocal-direct-tac/eghn_mappo/test15/seed-00008-2026-02-17-14-02-56/models
  # model_dir: /mnt/ssd/disk2/tyk/EGH-MARL/results_eswa/pursuit/hepnlocal-direct-tac/eghn_mappo/test20/seed-00006-2026-02-17-14-02-02/models
  # model_dir: /mnt/data/ssd/tyk/EGH-MARL/results_eswa/pursuit/hepnlocal-direct-tac/eghn_mappo/test5/seed-00008-2/models
  # model_dir: /mnt/data/ssd/tyk/EGH-MARL/results_eswa/pursuit/hepnlocal-direct-tac/eghn_mappo/test10/seed-00004-2026-02-16-06-19-53/models
  # model_dir: /mnt/data/ssd/tyk/EGH-MARL/results_eswa/pursuit/hepnlocal-direct-tac/eghn_mappo/test40/seed-00004-2026-02-14-12-05-36/models

